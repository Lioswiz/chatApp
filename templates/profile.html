<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Chat Platform</title>

    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>User Profile</h1>

        <p class="subtitle">
            Update your profile details below.
        </p>

        <form action="/profile" method="POST">

            <div class="form-group">
                <label>Username</label>
                <input
                    type="text"
                    value="{{.User.Username}}"
                    disabled
                    style="background-color: #e9ecef; cursor: not-allowed; opacity: 0.8;"
                >
            </div>

            <div class="form-group">
                <label>Email</label>
                <input
                    type="email"
                    value="{{.User.Email}}"
                    disabled
                    style="background-color: #e9ecef; cursor: not-allowed; opacity: 0.8;"
                >
            </div>

            <div class="form-group">
                <label>First Name</label>
                <input
                    type="text"
                    name="first_name"
                    value="{{.User.FirstName}}"
                    required
                >
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input
                    type="text"
                    name="last_name"
                    value="{{.User.LastName}}"
                    required
                >
            </div>

            <div class="form-group">
                <label>Avatar URL</label>
                <input
                    type="text"
                    name="avatar"
                    value="{{.User.Avatar}}"
                    placeholder="https://example.com/avatar.png"
                >
            </div>

            <button type="submit" class="btn-primary" style="margin-bottom: 12px;">
                Save Changes
            </button>

        </form>

        <p class="auth-link">
            <a href="/chat">
                Back to Chat
            </a>
        </p>

    </div>

</div>

</body>
</html>
